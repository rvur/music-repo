<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; }
        input:focus, button:focus { outline: none; }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100%); opacity: 0; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.2); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes float-drift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, -10px); }
            50% { transform: translate(-5px, 5px); }
            75% { transform: translate(-10px, -5px); }
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            left: 50%;
            top: 50%;
        }
        
        .star-small {
            width: 1px;
            height: 1px;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
        }
        
        .star-medium {
            width: 2px;
            height: 2px;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.7);
        }
        
        .star-large {
            width: 3px;
            height: 3px;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.9);
        }
        
        .toast-enter { animation: slideDown 0.3s ease-out; }
        .toast-exit { animation: slideUp 0.3s ease-out; }
        .float { animation: float 6s ease-in-out infinite; }
        .glow-on-hover:hover { animation: glow 2s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        .pulse-hover:hover { animation: pulse 0.6s ease-in-out; }
        
        .song-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .song-card:hover {
            transform: translateY(-8px) scale(1.05);
        }
        
        .song-card:hover .play-overlay {
            opacity: 1;
        }
        
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
            z-index: 20;
        }
        
        .play-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            background-size: 1000px 100%;
            animation: shimmer 3s infinite;
        }
        
        .song-info {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .song-card:hover .song-info {
            transform: translateY(0);
        }
        
        .action-buttons {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        
        .song-card:hover .action-buttons {
            opacity: 1;
            transform: translateY(0);
        }
        
        .gradient-border {
            position: relative;
            background: black;
        }
        
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, #333, #666, #333);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .gradient-border:hover::before {
            opacity: 1;
        }
        
        .search-glow:focus {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 z-50 hidden">
        <div class="bg-white text-black px-6 py-4 min-w-64 text-center">
            <span id="toastMessage"></span>
        </div>
    </div>

    <!-- Auth Screen -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center px-4">
        <!-- Starfield Background -->
        <div class="fixed inset-0 pointer-events-none overflow-hidden">
            <div id="authStarfield"></div>
        </div>
        
        <div class="w-full max-w-sm relative z-10">
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="username" class="w-full p-4 mb-3 bg-black border border-gray-800 focus:border-white transition">
                <input type="password" id="loginPassword" placeholder="password" class="w-full p-4 mb-6 bg-black border border-gray-800 focus:border-white transition">
                <button onclick="login()" class="w-full bg-white text-black p-4 hover:bg-gray-200 transition mb-6">login</button>
                <button onclick="showRegister()" class="w-full text-gray-500 hover:text-white transition">register</button>
            </div>
            
            <div id="registerForm" class="hidden">
                <input type="text" id="regUsername" placeholder="username" class="w-full p-4 mb-3 bg-black border border-gray-800 focus:border-white transition">
                <input type="password" id="regPassword" placeholder="password" class="w-full p-4 mb-3 bg-black border border-gray-800 focus:border-white transition">
                <input type="password" id="regRePassword" placeholder="confirm password" class="w-full p-4 mb-6 bg-black border border-gray-800 focus:border-white transition">
                <button onclick="register()" class="w-full bg-white text-black p-4 hover:bg-gray-200 transition mb-6">register</button>
                <button onclick="showLogin()" class="w-full text-gray-500 hover:text-white transition">login</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden pb-32">
        <!-- Decorative Background -->
        <div class="fixed inset-0 pointer-events-none overflow-hidden">
            <!-- Gradient Orbs -->
            <div class="absolute top-20 right-20 w-96 h-96 bg-gradient-to-br from-gray-800 to-transparent rounded-full blur-3xl float opacity-20"></div>
            <div class="absolute bottom-40 left-20 w-64 h-64 bg-gradient-to-tr from-gray-900 to-transparent rounded-full blur-3xl float opacity-20" style="animation-delay: -3s;"></div>
            
            <!-- Starfield -->
            <div id="starfield"></div>
        </div>

        <!-- Top Bar -->
        <div class="border-b border-gray-900 p-6 md:p-8 backdrop-blur-sm bg-black bg-opacity-80 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-6">
                    <nav class="flex gap-6 md:gap-8 justify-center md:justify-start">
                        <button onclick="showView('library')" class="text-gray-500 hover:text-white transition relative" id="libraryTab">
                            <span>library</span>
                            <div class="absolute bottom-0 left-0 right-0 h-px bg-white scale-x-0 transition-transform origin-left"></div>
                        </button>
                        <button onclick="showView('playlists')" class="text-gray-500 hover:text-white transition relative" id="playlistsTab">
                            <span>playlists</span>
                            <div class="absolute bottom-0 left-0 right-0 h-px bg-white scale-x-0 transition-transform origin-left"></div>
                        </button>
                        <button onclick="showView('upload')" class="text-gray-500 hover:text-white transition relative" id="uploadTab">
                            <span>upload</span>
                            <div class="absolute bottom-0 left-0 right-0 h-px bg-white scale-x-0 transition-transform origin-left"></div>
                        </button>
                    </nav>
                    <div class="flex items-center justify-center md:justify-end gap-6 md:gap-8">
                        <span id="username" class="text-gray-500"></span>
                        <button onclick="logout()" class="text-gray-500 hover:text-white transition">logout</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Library View -->
        <div id="libraryView" class="p-6 md:p-8 relative">
            <div class="max-w-7xl mx-auto">
                <!-- Search and Info Bar -->
                <div class="mb-8 space-y-4">
                    <input type="text" id="searchInput" placeholder="search your library..." 
                        class="w-full p-5 bg-gradient-to-r from-gray-900 to-black border border-gray-800 focus:border-white transition-all search-glow text-lg" 
                        oninput="searchMusic(this.value)">
                    <div class="flex justify-between items-center text-sm">
                        <div class="text-gray-500" id="songCount">loading...</div>
                        <div class="text-gray-500" id="librarySize">loading...</div>
                    </div>
                </div>
                
                <!-- Songs Grid -->
                <div id="musicGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4 md:gap-6"></div>
                <div id="noResults" class="hidden text-center text-gray-500 py-20 fade-in">
                    <div class="text-lg">no songs found</div>
                </div>
            </div>
        </div>

        <!-- Playlists View -->
        <div id="playlistsView" class="hidden p-6 md:p-8 relative">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-center md:justify-end items-center mb-8 md:mb-12">
                    <button onclick="showCreatePlaylist()" class="px-8 py-3 border border-gray-800 hover:border-white transition-all glow-on-hover hover:scale-105">create playlist</button>
                </div>
                <div id="playlistsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
                
                <div id="playlistDetail" class="hidden">
                    <button onclick="backToPlaylists()" class="mb-6 md:mb-8 text-gray-500 hover:text-white transition">← back</button>
                    <h3 class="text-xl md:text-2xl mb-6 md:mb-8 text-center md:text-left" id="playlistTitle"></h3>
                    <div id="playlistSongs" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Upload View -->
        <div id="uploadView" class="hidden p-6 md:p-8 relative">
            <div class="max-w-2xl mx-auto space-y-8 md:space-y-12">
                <div class="gradient-border p-8 border border-gray-900 hover:border-gray-700 transition-all hover:scale-[1.02] fade-in">
                    <div class="text-lg mb-6 text-gray-400">upload audio file</div>
                    <input type="file" id="fileInput" accept="audio/*" class="w-full p-4 mb-4 bg-black border border-gray-800 focus:border-white transition">
                    <button onclick="uploadFile()" class="w-full bg-white text-black p-4 hover:bg-gray-200 transition-all hover:scale-105" id="uploadFileBtn">upload file</button>
                </div>
                
                <div class="gradient-border p-8 border border-gray-900 hover:border-gray-700 transition-all hover:scale-[1.02] fade-in" style="animation-delay: 0.1s">
                    <div class="text-lg mb-6 text-gray-400">download from youtube</div>
                    <input type="text" id="ytLink" placeholder="paste youtube url" class="w-full p-4 mb-4 bg-black border border-gray-800 focus:border-white transition">
                    <button onclick="uploadYouTube()" class="w-full bg-white text-black p-4 hover:bg-gray-200 transition-all hover:scale-105" id="uploadYtBtn">download</button>
                </div>
            </div>
        </div>

        <!-- Music Player (Fixed Bottom) -->
        <div id="musicPlayer" class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-900 p-4 md:p-8 hidden backdrop-blur-sm bg-opacity-95 fade-in">
            <div class="max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row items-center gap-4 md:gap-6">
                    <img id="playerCover" src="" class="w-16 h-16 object-cover border border-gray-800 transition-transform hover:scale-105" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23111%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                    <div class="flex-1 text-center md:text-left">
                        <div id="playerTitle" class="text-sm md:text-base">no song playing</div>
                        <div class="text-xs md:text-sm text-gray-500 mt-1" id="playerTime">0:00 / 0:00</div>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3">
                        <button onclick="previousSong()" class="px-3 py-2 text-xs border border-gray-800 hover:border-white transition-all hover:scale-105">prev</button>
                        <button onclick="playPause()" id="playPauseBtn" class="px-4 py-2 text-xs bg-white text-black hover:bg-gray-200 transition-all hover:scale-105">play</button>
                        <button onclick="nextSong()" class="px-3 py-2 text-xs border border-gray-800 hover:border-white transition-all hover:scale-105">next</button>
                        <button onclick="stopMusic()" class="px-3 py-2 text-xs border border-gray-800 hover:border-white transition-all hover:scale-105">stop</button>
                        <div class="hidden md:flex items-center gap-2 ml-2">
                            <span class="text-xs text-gray-500">vol</span>
                            <input type="range" id="volumeSlider" min="0" max="100" value="50" class="w-20" oninput="setVolume(this.value)">
                        </div>
                    </div>
                </div>
            </div>
            <audio id="audioPlayer"></audio>
        </div>
    </div>

    <!-- Modal for creating playlist -->
    <div id="createPlaylistModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="w-full max-w-sm fade-in">
            <input type="text" id="playlistName" placeholder="playlist name" class="w-full p-4 mb-3 bg-black border border-gray-800 focus:border-white transition">
            <div class="flex gap-3">
                <button onclick="createPlaylist()" class="flex-1 bg-white text-black p-4 hover:bg-gray-200 transition-all hover:scale-105">create</button>
                <button onclick="closeCreatePlaylist()" class="flex-1 border border-gray-800 p-4 hover:border-white transition-all hover:scale-105">cancel</button>
            </div>
        </div>
    </div>

    <!-- Modal for adding to playlist -->
    <div id="addToPlaylistModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="w-full max-w-sm fade-in">
            <div id="playlistSelectList" class="space-y-2 mb-3 max-h-96 overflow-y-auto"></div>
            <button onclick="closeAddToPlaylist()" class="w-full border border-gray-800 p-4 hover:border-white transition-all hover:scale-105">cancel</button>
        </div>
    </div>

    <!-- Modal for delete confirmation -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="w-full max-w-sm fade-in">
            <div class="text-center mb-6">delete this song?</div>
            <div class="flex gap-3">
                <button onclick="confirmDelete()" class="flex-1 bg-white text-black p-4 hover:bg-gray-200 transition-all hover:scale-105">delete</button>
                <button onclick="closeDeleteModal()" class="flex-1 border border-gray-800 p-4 hover:border-white transition-all hover:scale-105">cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentSong = null;
        let currentSongIndex = -1;
        let allSongs = [];
        let allPlaylists = [];
        let currentPlaylist = null;
        let selectedSongForPlaylist = null;
        let songToDelete = null;
        let currentUsername = '';
        let filteredSongs = [];
        let starfieldIntervals = {};

        // Toast Notification System
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');
            
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('toast-exit');
                }, 300);
            }, duration);
        }

        // Auth Functions
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            if (res.ok) {
                currentUsername = data.username;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('username').textContent = currentUsername;
                showToast('logged in');
                createStarfield();
                loadMusic();
                loadPlaylists();
                loadLibrarySize();
            } else {
                showToast(data.error);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const re_password = document.getElementById('regRePassword').value;
            
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, re_password })
            });
            
            const data = await res.json();
            if (res.ok) {
                showToast('account created');
                showLogin();
            } else {
                showToast(data.error);
            }
        }

        async function logout() {
            await fetch('/api/users/logout', { method: 'POST' });
            showToast('logged out');
            setTimeout(() => location.reload(), 1000);
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        // View Functions
        function showView(view) {
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('playlistsView').classList.add('hidden');
            document.getElementById('uploadView').classList.add('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-white');
                btn.querySelector('div').style.transform = 'scaleX(0)';
            });
            
            if (view === 'library') {
                document.getElementById('libraryView').classList.remove('hidden');
                document.getElementById('libraryTab').classList.add('text-white');
                document.querySelector('#libraryTab div').style.transform = 'scaleX(1)';
                loadLibrarySize();
            } else if (view === 'playlists') {
                document.getElementById('playlistsView').classList.remove('hidden');
                document.getElementById('playlistsTab').classList.add('text-white');
                document.querySelector('#playlistsTab div').style.transform = 'scaleX(1)';
                loadPlaylists();
            } else if (view === 'upload') {
                document.getElementById('uploadView').classList.remove('hidden');
                document.getElementById('uploadTab').classList.add('text-white');
                document.querySelector('#uploadTab div').style.transform = 'scaleX(1)';
            }
        }

        // Music Functions
        async function loadMusic() {
            const res = await fetch('/api/music/');
            allSongs = await res.json();
            filteredSongs = allSongs;
            displayMusic(filteredSongs);
            updateSongCount();
        }

        async function loadLibrarySize() {
            const res = await fetch('/api/music/size');
            const data = await res.json();
            const sizeMB = data.message.size.toFixed(2);
            document.getElementById('librarySize').textContent = `${sizeMB} mb total`;
        }
        
        function updateSongCount() {
            const count = filteredSongs.length;
            const total = allSongs.length;
            const countEl = document.getElementById('songCount');
            if (countEl) {
                if (count === total) {
                    countEl.textContent = `${total} songs`;
                } else {
                    countEl.textContent = `${count} of ${total} songs`;
                }
            }
        }

        function searchMusic(query) {
            const lowerQuery = query.toLowerCase().trim();
            
            if (!lowerQuery) {
                filteredSongs = allSongs;
            } else {
                filteredSongs = allSongs.filter(song => 
                    song.song_name.toLowerCase().includes(lowerQuery)
                );
            }
            
            displayMusic(filteredSongs);
            updateSongCount();
        }

        function displayMusic(songs) {
            const grid = document.getElementById('musicGrid');
            const noResults = document.getElementById('noResults');
            
            if (songs.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            noResults.classList.add('hidden');
            
            grid.innerHTML = songs.map(song => `
                <div class="group gradient-border">
                    <img src="${song.cover}" class="w-full aspect-square object-cover mb-3 border border-gray-900 group-hover:border-gray-700 transition cursor-pointer" onclick="playSong(${song.id})" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23111%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'">
                    <div class="text-sm truncate mb-1">${song.song_name}</div>
                    <div class="text-xs text-gray-500 mb-3">${formatDuration(song.length)}</div>
                    <div class="flex gap-3 text-xs">
                        <button onclick="showAddToPlaylistModal(${song.id})" class="text-gray-500 hover:text-white transition">add</button>
                        <button onclick="showDeleteModal(${song.id})" class="text-gray-500 hover:text-white transition">delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function playSong(songId) {
            const song = allSongs.find(s => s.id === songId);
            if (!song) return;
            
            currentSong = song;
            currentSongIndex = allSongs.findIndex(s => s.id === songId);
            
            const audio = document.getElementById('audioPlayer');
            audio.src = `/api/music/stream/${songId}`;
            audio.play();
            
            document.getElementById('musicPlayer').classList.remove('hidden');
            const playerCover = document.getElementById('playerCover');
            playerCover.src = song.cover;
            playerCover.style.animation = 'pulse 2s ease-in-out infinite';
            document.getElementById('playerTitle').textContent = song.song_name;
            document.getElementById('playPauseBtn').textContent = 'pause';
            
            audio.ontimeupdate = () => {
                const current = formatDuration(Math.floor(audio.currentTime));
                const total = formatDuration(song.length);
                document.getElementById('playerTime').textContent = `${current} / ${total}`;
            };
            
            // Auto-play next song when current song ends
            audio.onended = () => {
                nextSong();
            };
        }

        function nextSong() {
            if (allSongs.length === 0) return;
            
            const nextIndex = (currentSongIndex + 1) % allSongs.length;
            const nextSongId = allSongs[nextIndex].id;
            playSong(nextSongId);
        }

        function previousSong() {
            if (allSongs.length === 0) return;
            
            const prevIndex = currentSongIndex - 1 < 0 ? allSongs.length - 1 : currentSongIndex - 1;
            const prevSongId = allSongs[prevIndex].id;
            playSong(prevSongId);
        }

        function playPause() {
            const audio = document.getElementById('audioPlayer');
            const btn = document.getElementById('playPauseBtn');
            const playerCover = document.getElementById('playerCover');
            
            if (audio.paused) {
                audio.play();
                btn.textContent = 'pause';
                playerCover.style.animation = 'pulse 2s ease-in-out infinite';
            } else {
                audio.pause();
                btn.textContent = 'play';
                playerCover.style.animation = 'none';
            }
        }

        function stopMusic() {
            const audio = document.getElementById('audioPlayer');
            const playerCover = document.getElementById('playerCover');
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('playPauseBtn').textContent = 'play';
            playerCover.style.animation = 'none';
            currentSong = null;
            currentSongIndex = -1;
        }

        function setVolume(value) {
            // Use exponential curve for more sensitive control at lower volumes
            const normalizedVolume = (value / 100) ** 2;
            document.getElementById('audioPlayer').volume = normalizedVolume;
        }

        function showDeleteModal(songId) {
            songToDelete = songId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            songToDelete = null;
        }

        async function confirmDelete() {
            if (!songToDelete) return;
            
            const res = await fetch(`/api/music/delete/${songToDelete}`, {
                method: 'DELETE'
            });
            
            const data = await res.json();
            if (res.ok) {
                closeDeleteModal();
                showToast('song deleted');
                
                if (currentSong && currentSong.id === songToDelete) {
                    stopMusic();
                    document.getElementById('musicPlayer').classList.add('hidden');
                }
                
                loadMusic();
                loadLibrarySize();
            } else {
                showToast(data.error);
            }
        }

        // Playlist Functions
        async function loadPlaylists() {
            const res = await fetch('/api/playlist/');
            allPlaylists = await res.json();
            displayPlaylists();
        }

        function displayPlaylists() {
            const grid = document.getElementById('playlistsGrid');
            grid.innerHTML = allPlaylists.map((playlist, index) => `
                <div class="gradient-border border border-gray-900 p-6 hover:border-gray-700 cursor-pointer transition-all hover:scale-105 fade-in" style="animation-delay: ${index * 0.1}s" onclick="viewPlaylist(${playlist.id})">
                    <div class="text-base md:text-lg mb-1">${playlist.name}</div>
                    <div class="text-sm text-gray-500">${playlist.song_count} songs</div>
                </div>
            `).join('');
            
            document.getElementById('playlistsGrid').classList.remove('hidden');
            document.getElementById('playlistDetail').classList.add('hidden');
        }

        async function viewPlaylist(playlistId) {
            const res = await fetch(`/api/playlist/${playlistId}`);
            currentPlaylist = await res.json();
            
            document.getElementById('playlistTitle').textContent = currentPlaylist.name;
            document.getElementById('playlistSongs').innerHTML = currentPlaylist.songs.length > 0 ? currentPlaylist.songs.map((song, index) => `
                <div class="gradient-border border border-gray-900 p-4 flex items-center gap-4 hover:border-gray-700 transition-all hover:scale-[1.02] fade-in" style="animation-delay: ${index * 0.05}s">
                    <img src="${song.cover}" class="w-12 h-12 object-cover border border-gray-800 transition-transform hover:scale-110" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23111%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                    <div class="flex-1">
                        <div class="text-sm">${song.song_name}</div>
                        <div class="text-xs text-gray-500 mt-1">${formatDuration(song.length)}</div>
                    </div>
                    <button onclick="playSong(${song.id})" class="text-sm text-gray-500 hover:text-white transition-all hover:scale-110">play</button>
                </div>
            `).join('') : '<div class="text-gray-500 text-center py-12 fade-in">no songs in this playlist</div>';
            
            document.getElementById('playlistsGrid').classList.add('hidden');
            document.getElementById('playlistDetail').classList.remove('hidden');
        }

        function backToPlaylists() {
            displayPlaylists();
        }

        function showCreatePlaylist() {
            document.getElementById('createPlaylistModal').classList.remove('hidden');
        }

        function closeCreatePlaylist() {
            document.getElementById('createPlaylistModal').classList.add('hidden');
            document.getElementById('playlistName').value = '';
        }

        async function createPlaylist() {
            const name = document.getElementById('playlistName').value;
            if (!name) return showToast('enter playlist name');
            
            const res = await fetch('/api/playlist/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            
            if (res.ok) {
                closeCreatePlaylist();
                showToast('playlist created');
                loadPlaylists();
            }
        }

        function showAddToPlaylistModal(songId) {
            selectedSongForPlaylist = songId;
            const list = document.getElementById('playlistSelectList');
            
            if (allPlaylists.length === 0) {
                list.innerHTML = '<div class="text-gray-500 text-center py-8 fade-in">no playlists yet</div>';
            } else {
                list.innerHTML = allPlaylists.map((playlist, index) => `
                    <button onclick="addSongToPlaylist(${playlist.id})" class="w-full text-left p-4 border border-gray-900 hover:border-gray-700 transition-all hover:scale-105 fade-in" style="animation-delay: ${index * 0.05}s">
                        ${playlist.name}
                    </button>
                `).join('');
            }
            
            document.getElementById('addToPlaylistModal').classList.remove('hidden');
        }

        function closeAddToPlaylist() {
            document.getElementById('addToPlaylistModal').classList.add('hidden');
            selectedSongForPlaylist = null;
        }

        async function addSongToPlaylist(playlistId) {
            const res = await fetch(`/api/playlist/${playlistId}/songs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ song_id: selectedSongForPlaylist })
            });
            
            const data = await res.json();
            if (res.ok) {
                showToast('added to playlist');
                closeAddToPlaylist();
                loadPlaylists();
            } else {
                showToast(data.error);
            }
        }

        // Upload Functions
        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (!input.files[0]) return showToast('select a file');
            
            const uploadBtn = document.getElementById('uploadFileBtn');
            uploadBtn.textContent = 'uploading...';
            uploadBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', input.files[0]);
            
            const res = await fetch('/api/music/', {
                method: 'POST',
                body: formData
            });
            
            uploadBtn.textContent = 'upload file';
            uploadBtn.disabled = false;
            
            if (res.ok) {
                showToast('file uploaded');
                input.value = '';
                loadMusic();
                loadLibrarySize();
            } else {
                const data = await res.json();
                showToast(data.error);
            }
        }

        async function uploadYouTube() {
            const link = document.getElementById('ytLink').value;
            if (!link) return showToast('enter youtube url');
            
            const uploadBtn = document.getElementById('uploadYtBtn');
            uploadBtn.textContent = 'downloading...';
            uploadBtn.disabled = true;
            
            const res = await fetch('/api/music/yt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ yt_link: link })
            });
            
            uploadBtn.textContent = 'download';
            uploadBtn.disabled = false;
            
            if (res.ok) {
                showToast('youtube download complete');
                document.getElementById('ytLink').value = '';
                loadMusic();
                loadLibrarySize();
            } else {
                const data = await res.json();
                showToast(data.error);
            }
        }

        // Utility Functions
        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Check if user is already logged in
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/users/');
                if (res.ok) {
                    const data = await res.json();
                    currentUsername = data.username;
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('username').textContent = currentUsername;
                    loadMusic();
                    loadPlaylists();
                    loadLibrarySize();
                    showView('library');
                    createStarfield();
                }
            } catch (error) {
                // User not logged in, show login screen
            }
        }
        
        // Create starfield background
        function createStarfield(containerId = 'starfield') {
            const starfield = document.getElementById(containerId);
            if (!starfield || starfieldIntervals[containerId]) return;
            
            // Create stars continuously for flying effect
            starfieldIntervals[containerId] = setInterval(() => {
                createFlyingStar(containerId);
            }, 50); // Create a new star every 50ms
            
            // Create initial batch of stars
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createFlyingStar(containerId), i * 50);
            }
        }
        
        function createFlyingStar(containerId) {
            const starfield = document.getElementById(containerId);
            if (!starfield) return;
            
            const star = document.createElement('div');
            const size = Math.random();
            
            // Determine star size class
            if (size > 0.85) {
                star.className = 'star star-large';
            } else if (size > 0.6) {
                star.className = 'star star-medium';
            } else {
                star.className = 'star star-small';
            }
            
            // Random angle for radial movement from center
            const angle = Math.random() * Math.PI * 2;
            const distance = 1000 + Math.random() * 500; // How far the star travels
            
            // Calculate end position
            const endX = Math.cos(angle) * distance;
            const endY = Math.sin(angle) * distance;
            
            // Random speed (1-3 seconds)
            const speed = 1.5 + Math.random() * 1.5;
            const scale = 2 + Math.random() * 4;
            
            // Set animation timing
            star.style.animation = `starfly ${speed}s linear forwards`;
            
            // Create inline keyframe animation
            const animationName = `starfly-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            const keyframes = `
                @keyframes ${animationName} {
                    0% {
                        transform: translate(-50%, -50%) translate(0px, 0px) scale(0.1);
                        opacity: 0;
                    }
                    5% {
                        opacity: 1;
                    }
                    95% {
                        opacity: 1;
                    }
                    100% {
                        transform: translate(-50%, -50%) translate(${endX}px, ${endY}px) scale(${scale});
                        opacity: 0;
                    }
                }
            `;
            
            // Inject keyframes
            const styleSheet = document.styleSheets[0];
            styleSheet.insertRule(keyframes, styleSheet.cssRules.length);
            star.style.animation = `${animationName} ${speed}s linear forwards`;
            
            starfield.appendChild(star);
            
            // Remove star after animation completes
            setTimeout(() => {
                star.remove();
            }, speed * 1000);
        }
        
        function createShootingStar(containerId = 'starfield') {
            // Not used in flying mode
        }

        // Set default volume and check login on load
        document.getElementById('audioPlayer').volume = 0.25; // 50 on slider with exponential curve
        
        // Create starfield for login page
        createStarfield('authStarfield');
        
        checkLoginStatus();
    </script>
</body>
</html>
